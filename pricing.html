<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiyatlar — bydesign.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['DM Sans', 'sans-serif'], serif: ['DM Serif Display', 'serif'] },
          colors: {
            brand: { 50:'#f0f7ff',100:'#e0effe',200:'#bae0fd',300:'#7dc8fb',400:'#38aaf5',500:'#0e8fe3',600:'#0271c1',700:'#035a9c',800:'#074c80',900:'#0c406b' },
            stone: { 50:'#fafaf9',100:'#f5f5f4',200:'#e7e5e4',300:'#d6d3d1',400:'#a8a29e',500:'#78716c',600:'#57534e',700:'#44403c',800:'#292524',900:'#1c1917' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-stone-50 font-sans text-stone-800 antialiased">

  <!-- NAV -->
  <header class="sticky top-0 z-40 border-b border-stone-200 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3.5">
      <a href="index.html" class="font-serif text-xl text-stone-900">by<span class="text-brand-600">design</span><span class="ml-2 rounded-full bg-brand-50 px-2 py-0.5 text-[10px] font-medium text-brand-600 uppercase tracking-wider">AI Lab</span></a>
      <nav class="hidden items-center gap-1 md:flex">
        <a href="index.html" class="nav-link">Araçlar</a>
        <a href="pricing.html" class="nav-link active">Fiyatlar</a>
        <a href="#" id="admin-nav-link" class="hidden nav-link text-brand-600">Admin Panel</a>
      </nav>
      <div class="flex items-center gap-3">
        <div id="user-avatar" class="h-8 w-8 rounded-full bg-brand-100 flex items-center justify-center text-brand-700 text-xs font-semibold"></div>
        <button onclick="logout()" class="rounded-lg border border-stone-200 px-3 py-1.5 text-xs font-medium text-stone-600 hover:bg-stone-100 transition-colors">Çıkış</button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="border-b border-stone-200 bg-white px-6 py-16 text-center">
    <div class="mx-auto max-w-xl">
      <h1 class="font-serif text-4xl text-stone-900">Sade fiyatlandırma,<br/><em>güçlü yapay zeka</em></h1>
      <p class="mt-4 text-stone-500">İhtiyacına göre seç. İstediğinde değiştir.</p>
    </div>
  </section>

  <!-- PLANS -->
  <main class="mx-auto max-w-5xl px-6 py-16">
    <div id="plans-grid" class="grid gap-6 md:grid-cols-3">
      <!-- Plans rendered by JS from Firestore -->
      <div class="col-span-3 text-center text-stone-400 py-12">
        <div class="inline-flex items-center gap-2"><div class="h-4 w-4 rounded-full border-2 border-brand-400 border-t-transparent animate-spin"></div> Planlar yükleniyor...</div>
      </div>
    </div>

    <!-- İyzico payment modal -->
    <div id="payment-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
      <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-lg font-semibold text-stone-900">Ödeme</h3>
          <button onclick="closePaymentModal()" class="text-stone-400 hover:text-stone-600">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="payment-plan-summary" class="mb-6 rounded-xl bg-stone-50 border border-stone-200 p-4"></div>
        <div class="space-y-4">
          <div>
            <label class="mb-1.5 block text-xs font-medium text-stone-600">Ad Soyad</label>
            <input id="pay-name" type="text" class="input-field w-full" placeholder="Kart üzerindeki isim" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-medium text-stone-600">Kart Numarası</label>
            <input id="pay-card" type="text" class="input-field w-full" placeholder="0000 0000 0000 0000" maxlength="19" oninput="formatCard(this)" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="mb-1.5 block text-xs font-medium text-stone-600">Son Kullanma</label>
              <input id="pay-expiry" type="text" class="input-field w-full" placeholder="AA/YY" maxlength="5" />
            </div>
            <div>
              <label class="mb-1.5 block text-xs font-medium text-stone-600">CVV</label>
              <input id="pay-cvv" type="text" class="input-field w-full" placeholder="000" maxlength="3" />
            </div>
          </div>
          <div id="pay-error" class="hidden rounded-lg bg-red-50 px-4 py-3 text-sm text-red-600"></div>
          <button onclick="processPayment()" class="btn-primary w-full">
            Güvenli Öde · <span id="pay-amount"></span>
          </button>
          <p class="text-center text-xs text-stone-400 flex items-center justify-center gap-1">
            <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            İyzico altyapısı ile güvenli ödeme
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-t border-stone-200 bg-white px-6 py-8 text-center text-xs text-stone-400">
    <p>© 2025 bydesign.com.tr · AI Laboratuvarı · <a href="mailto:info@bydesign.com.tr" class="hover:text-stone-600">info@bydesign.com.tr</a></p>
  </footer>

  <script type="module" src="firebase-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="pricing.js"></script>
</body>
</html>
